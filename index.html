function randomizeRound() {
  court = pick(COURTS);
  bodyType1 = pick(BODY_TYPES);
  bodyType2 = pick(BODY_TYPES);
  if (sportMode === 'volleyball') {
    ballType = pick(VOLLEY_BALL_TYPES);
    netShape = pick(NET_SHAPES);
    hoopShape = null;
    goalShape = null;
  } else if (sportMode === 'soccer') {
    ballType = pick(SOCCER_BALL_TYPES);
    goalShape = pick(GOAL_SHAPES);
    hoopShape = null;
    netShape = null;
  } else if (sportMode === 'handball') {
    ballType = pick(HANDBALL_BALL_TYPES);
    goalShape = pick(HANDBALL_GOAL_SHAPES);
    hoopShape = null;
    netShape = null;
  } else if (sportMode === 'sumo') {
    ballType = null;
    hoopShape = null;
    goalShape = null;
    netShape = null;
    // Use pre-shuffled map order (round 0 = Classic Ring, rest shuffled)
    sumoMap = sumoMapOrder[sumoRound] || SUMO_MAPS[0];
    sumoRing = sumoMap; // backwards compat for CPU AI references
    sumoRound++;
  } else {
    ballType = pick(BALL_TYPES);
    hoopShape = pick(HOOP_SHAPES);
    goalShape = null;
    netShape = null;
  }
  
  // Create players - sumo is 1v1, others are 2v2
  if (sportMode === 'sumo') {
    // Spawn players at map-defined spawn points or default ring positions
    let spawn1x, spawn2x, spawn1y, spawn2y;
    if (sumoMap && sumoMap.spawns) {
      spawn1x = sumoMap.spawns[0].x;
      spawn1y = sumoMap.spawns[0].y;
      spawn2x = sumoMap.spawns[1].x;
      spawn2y = sumoMap.spawns[1].y;
    } else {
      spawn1x = W / 2 - 40;
      spawn1y = GROUND_Y;
      spawn2x = W / 2 + 40;
      spawn2y = GROUND_Y;
    }
    players = [
      createPlayer(spawn1x, 0, 0, bodyType1),
      createPlayer(spawn2x, 1, 1, bodyType2),
    ];
    players[0].y = spawn1y;
    players[1].y = spawn2y;
  } else if (sportMode === 'volleyball') {
    players = [
      createPlayer(W * 0.15, 0, 0, bodyType1),
      createPlayer(W * 0.35, 0, 1, bodyType1),
      createPlayer(W * 0.65, 1, 2, bodyType2),
      createPlayer(W * 0.85, 1, 3, bodyType2),
    ];
  } else {
    players = [
      createPlayer(W * 0.30, 0, 0, bodyType1),
      createPlayer(W * 0.45, 0, 1, bodyType1),
      createPlayer(W * 0.55, 1, 2, bodyType2),
      createPlayer(W * 0.70, 1, 3, bodyType2),
    ];
  }
  
  // Randomize colors slightly per round
  const jerseyColors1 = ['#e74c3c', '#d35400', '#c0392b', '#e91e63'];
  const jerseyColors2 = ['#3498db', '#2980b9', '#1abc9c', '#9b59b6'];
  const j1 = pick(jerseyColors1);
  const j2 = pick(jerseyColors2);
  const skinTones = ['#f5cba7', '#d4a574', '#8d5524', '#c68642', '#f1c27d'];
  const s1 = pick(skinTones), s2 = pick(skinTones);
  
  for (const p of players) {
    if (p.team === 0) {
      p.colors.jersey = j1; p.colors.shorts = j1; p.colors.skin = s1;
    } else {
      p.colors.jersey = j2; p.colors.shorts = j2; p.colors.skin = s2;
    }
  }
  
  if (sportMode === 'sumo') {
    // Sumo wrestlers get special mawashi (loincloth) colors
    for (const p of players) {
      p.colors.shorts = p.team === 0 ? '#8b0000' : '#00008b';
    }
  }
  
  if (sportMode === 'sumo') {
    ball = null;
  } else {
    ball = createBall();
  }
  createHoops();
  particles = [];
  roundStartTimer = 90;
  modifierTextTimer = 60;
  // Reset shake so it doesn't carry into the new round
  shakeX = 0;
  shakeY = 0;
  shakeTimer = 0;
}

function startGame(mode) {
  gameMode = mode;
  scores = [0, 0];
  sumoRound = 0;
  // Build shuffled sumo map order: Classic Ring first, then all others shuffled
  if (sportMode === 'sumo') {
    const others = SUMO_MAPS.slice(1); // all maps except Classic Ring
    // Fisher-Yates shuffle
    for (let i = others.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [others[i], others[j]] = [others[j], others[i]];
    }
    // Ensure no two ring (non-platform) maps are back-to-back
    for (let i = 1; i < others.length; i++) {
      if (others[i].type === 'ring' && others[i - 1].type === 'ring') {
        // Find the nearest platform map after i to swap with
        let swapped = false;
        for (let k = i + 1; k < others.length; k++) {
          if (others[k].type !== 'ring') {
            [others[i], others[k]] = [others[k], others[i]];
            swapped = true;
            break;
          }
        }
        // If none found after, look before
        if (!swapped) {
          for (let k = i - 2; k >= 0; k--) {
            if (others[k].type !== 'ring') {
              [others[i], others[k]] = [others[k], others[i]];
              break;
            }
          }
        }
      }
    }
    // Also check first non-classic map vs Classic Ring (index 0 is ring)
    if (others.length > 0 && others[0].type === 'ring') {
      for (let k = 1; k < others.length; k++) {
        if (others[k].type !== 'ring') {
          [others[0], others[k]] = [others[k], others[0]];
          break;
        }
      }
    }
    sumoMapOrder = [SUMO_MAPS[0], ...others];
  }
  randomizeRound();
  gameState = 'playing';
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update() {
  gameTime++;
  
  if (gameState === 'menu') {
    if (menuScreen === 'sport') {
      // Sport selection navigation
      if (keys['ArrowUp'] || keys['KeyW']) {
        if (!keys._menuUp) { sportSelection = (sportSelection + 4) % 5; keys._menuUp = true; SFX.menuSelect(); }
      } else { keys._menuUp = false; }
      
      if (keys['ArrowDown'] || keys['KeyS']) {
        if (!keys._menuDown) { sportSelection = (sportSelection + 1) % 5; keys._menuDown = true; SFX.menuSelect(); }
      } else { keys._menuDown = false; }
      
      if (keys['Enter'] || keys['Space']) {
        if (!keys._menuSelect) {
          sportMode = ['basketball', 'soccer', 'volleyball', 'handball', 'sumo'][sportSelection];
          menuScreen = 'mode';
          menuSelection = 0;
          keys._menuSelect = true;
          SFX.menuConfirm();
        }
      } else { keys._menuSelect = false; }
    } else {
      // Mode selection navigation (3 options: 1P, 2P, Back)
      if (keys['ArrowUp'] || keys['KeyW']) {
        if (!keys._menuUp) { menuSelection = (menuSelection + 2) % 3; keys._menuUp = true; SFX.menuSelect(); }
      } else { keys._menuUp = false; }
      
      if (keys['ArrowDown'] || keys['KeyS']) {
        if (!keys._menuDown) { menuSelection = (menuSelection + 1) % 3; keys._menuDown = true; SFX.menuSelect(); }
      } else { keys._menuDown = false; }
      
      if (keys['Escape']) {
        if (!keys._menuBack) { menuScreen = 'sport'; sportSelection = 0; keys._menuBack = true; SFX.menuSelect(); }
      } else { keys._menuBack = false; }
      
      if (keys['Enter'] || keys['Space']) {
        if (!keys._menuSelect) {
          if (menuSelection === 2) {
            menuScreen = 'sport'; sportSelection = 0; SFX.menuSelect();
          } else {
            startGame(menuSelection === 0 ? 1 : 2);
            SFX.menuConfirm();
          }
          keys._menuSelect = true;
        }
      } else { keys._menuSelect = false; }
    }
    
    return;
  }
  
  if (gameState === 'gameover') {
    if (keys['Enter'] || keys['Space']) {
      if (!keys._restart) {
        startGame(gameMode);
        keys._restart = true;
      }
    } else { keys._restart = false; }
    
    if (keys['Escape']) {
      gameState = 'menu';
      menuScreen = 'sport';
      shakeX = 0; shakeY = 0; shakeTimer = 0;
    }
    return;
  }
  
  if (gameState === 'scored') {
    scoreTimer--;
    if (scoreTimer <= 0) {
      if (scores[0] >= WINNING_SCORE || scores[1] >= WINNING_SCORE) {
        gameState = 'gameover';
        shakeX = 0; shakeY = 0; shakeTimer = 0;
        SFX.win();
      } else {
        randomizeRound();
        gameState = 'playing';
      }
    }
    updateParticles();
    return;
  }
  
  // Playing state
  if (roundStartTimer > 0) {
    roundStartTimer--;
    // Countdown beeps
    if (roundStartTimer === 89) SFX.countdown(); // Play full 3-2-1-GO mp3 once
    // Still update sway during countdown
    players.forEach(p => {
      p.leanPhase += p.leanSpeed * 1.8;
      p.lean = Math.sin(p.leanPhase) * p.leanAmplitude;
      p.bobPhase += 0.06;
    });
    return;
  }
  
  // Player 1 input (WASD + S to shoot; also arrow keys in vs CPU mode)
  const p1Input = {
    left: !!keys['KeyA'] || (gameMode === 1 && !!keys['ArrowLeft']),
    right: !!keys['KeyD'] || (gameMode === 1 && !!keys['ArrowRight']),
    jump: !!keys['KeyW'] || (gameMode === 1 && !!keys['ArrowUp']),
    shoot: !!keys['KeyS'] || (gameMode === 1 && !!keys['ArrowDown'])
  };
  
  // Player 2 input (Arrow keys + Down to shoot)
  const p2Input = {
    left: !!keys['ArrowLeft'],
    right: !!keys['ArrowRight'],
    jump: !!keys['ArrowUp'],
    shoot: !!keys['ArrowDown']
  };
  
  // Update team 1 players (both respond to WASD)
  updatePlayer(players[0], p1Input, 1);
  if (sportMode !== 'sumo') updatePlayer(players[1], p1Input, 1);
  
  // Update team 2 players
  if (sportMode === 'sumo') {
    if (gameMode === 1) {
      updatePlayer(players[1], updateCPU(players[1]), 1);
    } else {
      updatePlayer(players[1], p2Input, 1);
    }
  } else {
    if (gameMode === 1) {
      // CPU control - each player gets its own AI input
      updatePlayer(players[2], updateCPU(players[2]), 1);
      updatePlayer(players[3], updateCPU(players[3]), 1);
    } else {
      updatePlayer(players[2], p2Input, 1);
      updatePlayer(players[3], p2Input, 1);
    }
  }
  
  // Player collisions
  playerCollisions();
  
  // Ball physics (skip for sumo)
  if (sportMode !== 'sumo') {
    updateBall();
  }
  
  // Sumo scoring
  if (sportMode === 'sumo' && sumoMap && roundStartTimer <= 0) {
    for (let i = 0; i < players.length; i++) {
      const p = players[i];
      let isOut = false;
      
      if (sumoMap.type === 'ring') {
        // Ring-out: check if player is outside ring boundary
        const cx = W / 2;
        const ringR = sumoMap.radius;
        const dx = p.x - cx;
        const adist = Math.abs(dx);
        if (adist > ringR + 15) isOut = true;
      } else if (sumoMap.type === 'platform') {
        // Platform: touching the floor = out
        if (p.y >= GROUND_Y) isOut = true;
      }
      
      if (isOut) {
        const scorer = p.team === 0 ? 1 : 0;
        scores[scorer] += 1;
        lastScorer = scorer;
        gameState = 'scored';
        scoreTimer = 60;
        flashTimer = 30;
        shakeX = 8;
        shakeY = 8;
        shakeTimer = 18;
        shakeMaxTimer = 18;
        spawnParticles(p.x, p.y - 20, 30, scorer === 0 ? '#e74c3c' : '#3498db', 5);
        spawnParticles(p.x, p.y - 20, 15, '#f39c12', 4);
        SFX.hoopEntry();
        SFX.score();
        break;
      }
    }
  }
  
  // Check scoring (non-sumo)
  if (sportMode !== 'sumo') {
    const scorer = checkHoopScore();
    if (scorer >= 0) {
      const pts = ball ? ball.points : 1;
      scores[scorer] += pts;
      lastScorer = scorer;
      gameState = 'scored';
      scoreTimer = 60;
      flashTimer = 30;
      shakeX = 8;
      shakeY = 8;
      shakeTimer = 18; // 0.3 second at 60fps
      shakeMaxTimer = 18; // Store initial value for inverse-square falloff
      
      // Score particles
      if (sportMode === 'volleyball') {
        // Particles at ball position
        spawnParticles(ball.x, ball.y, 30, scorer === 0 ? '#e74c3c' : '#3498db', 5);
        if (pts === 2) {
          spawnParticles(ball.x, ball.y, 20, 'rainbow', 6);
        }
      } else {
        const hoop = hoops[scorer === 0 ? 1 : 0]; // The hoop they scored in
        spawnParticles(hoop.x, hoop.y, 30, scorer === 0 ? '#e74c3c' : '#3498db', 5);
        if (pts === 2) {
          spawnParticles(hoop.x, hoop.y, 20, 'rainbow', 6);
        }
      }
      SFX.hoopEntry();
      SFX.score();
    }
  }
  
  // Screen shake decay - inverse square law falloff
  if (shakeTimer > 0) {
    shakeTimer--;
    // Inverse square: intensity = initial / (1 + elapsed)^2
    const elapsed = shakeMaxTimer - shakeTimer;
    const falloff = 1 / ((1 + elapsed * 0.15) * (1 + elapsed * 0.15));
    shakeX = 8 * falloff;
    shakeY = 8 * falloff;
  } else {
    shakeX = 0;
    shakeY = 0;
  }
  
  // Flash timer
  if (flashTimer > 0) flashTimer--;
  
  updateParticles();
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  ctx.save();
  
  // Screen shake
  if (shakeX > 0.5 || shakeY > 0.5) {
    ctx.translate(rand(-shakeX, shakeX), rand(-shakeY, shakeY));
  }
  
  if (gameState === 'menu') {
    drawMenu();
    mouse.clicked = false;
    ctx.restore();
    return;
  }
  
  // Draw court
  drawCourt();
  
  // Draw hoops (behind players)
  hoops.forEach(drawHoop);
  
  // Draw volleyball net
  if (sportMode === 'volleyball') drawVolleyNet();
  
  // Draw sumo ring
  if (sportMode === 'sumo') drawSumoRing();
  
  // Draw players sorted by y position
  const sorted = [...players].sort((a, b) => a.y - b.y);
  sorted.forEach(drawPlayer);
  
  // Draw ball (skip for sumo)
  if (sportMode !== 'sumo') drawBall();
  
  // Particles
  drawParticles();
  
  // Scoreboard
  drawScoreboard();
  
  // Round start countdown
  if (roundStartTimer > 0 && gameState === 'playing') {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    
    // Show round info
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    if (sportMode === 'sumo') {
      ctx.fillText('Court: ' + court.name + '  |  Map: ' + (sumoMap ? sumoMap.name : 'Standard'), W/2, H/2 - 60);
      const sumoHint = (sumoMap && sumoMap.type === 'platform') ? 'Don\'t get knocked to the floor!' : 'Push your opponent out!';
      ctx.fillText(sumoHint, W/2, H/2 - 35);
    } else {
      ctx.fillText('Court: ' + court.name + '  |  Ball: ' + ballType.name, W/2, H/2 - 60);
      const shapeLabel = sportMode === 'volleyball' ? 'Net: ' + (netShape ? netShape.name : 'Standard') : ((sportMode === 'soccer' || sportMode === 'handball') ? 'Goal: ' + (goalShape ? goalShape.name : 'Standard') : 'Hoop: ' + (hoopShape ? hoopShape.name : 'Standard'));
      ctx.fillText(shapeLabel, W/2, H/2 - 35);
    }
    
    const countNum = Math.ceil(roundStartTimer / 30);
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 60px monospace';
    ctx.fillText(countNum > 0 ? String(countNum) : 'GO!', W/2, H/2 + 30);
  }
  
  // Modifier text after round starts (1 second)
  if (modifierTextTimer > 0 && roundStartTimer <= 0 && gameState === 'playing') {
    modifierTextTimer--;
    const alpha = Math.min(1, modifierTextTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    if (sportMode === 'sumo') {
      ctx.fillText(court.name + '  •  ' + (sumoMap ? sumoMap.name : 'Standard'), W/2, 70);
    } else {
      const shapeName = sportMode === 'volleyball' ? (netShape ? netShape.name : 'Standard') + ' Net' : ((sportMode === 'soccer' || sportMode === 'handball') ? (goalShape ? goalShape.name : 'Standard') + ' Goal' : (hoopShape ? hoopShape.name : 'Standard') + ' Hoop');
      ctx.fillText(court.name + '  •  ' + ballType.name + ' Ball  •  ' + shapeName, W/2, 70);
      if (ballType && ballType.points === 2) {
        ctx.fillStyle = rainbowColor(gameTime);
        ctx.fillText('★ RAINBOW 2x POINTS ★', W/2, 95);
      }
    }
    ctx.globalAlpha = 1;
  }
  
  // Score flash
  if (flashTimer > 0) {
    ctx.globalAlpha = flashTimer / 30 * 0.3;
    ctx.fillStyle = lastScorer === 0 ? '#e74c3c' : '#3498db';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
  
  // Scored overlay
  if (gameState === 'scored') {
    drawScoredScreen();
  }
  
  // Game over overlay
  if (gameState === 'gameover') {
    drawGameOver();
  }
  
  // Home button (top-left) during gameplay
  if (gameState !== 'menu') {
    const hbX = 8, hbY = 8, hbW = 50, hbH = 24;
    const hbHover = isMouseInRect(hbX, hbY, hbW, hbH);
    drawPixelRect(hbX, hbY, hbW, hbH, hbHover ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.5)');
    drawPixelRect(hbX + 1, hbY + 1, hbW - 2, hbH - 2, hbHover ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.3)');
    ctx.fillStyle = hbHover ? '#fff' : '#aaa';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HOME', hbX + hbW / 2, hbY + 16);
    
    if (hbHover && mouse.clicked) {
      gameState = 'menu';
      menuScreen = 'sport';
      shakeX = 0; shakeY = 0; shakeTimer = 0;
      mouse.clicked = false;
    }
  }
  
  // Clear mouse click at end of frame
  mouse.clicked = false;
  
  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
